name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements_dev.txt

      - name: Ruff lint
        run: ruff check custom_components/ ha_claude_agent_addon/src/ tests/

      - name: Ruff format check
        run: ruff format --check custom_components/ ha_claude_agent_addon/src/ tests/

      - name: Mypy (integration)
        run: mypy custom_components/ha_claude_agent/

      - name: Mypy (add-on)
        run: mypy ha_claude_agent_addon/src/

      - name: Pytest
        run: pytest tests/ -v
