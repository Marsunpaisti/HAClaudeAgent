name: CI

on:
  pull_request:

permissions: {}

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # setup-uv stopped publishing floating major/minor tags at v8 — pin exact.
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      # Pre-commit is the single source of truth for lint + format + hygiene
      # (ruff, trailing-whitespace, end-of-file-fixer, check-{json,yaml,toml},
      # check-merge-conflict). Anything not covered here runs as its own step.
      - name: Pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Mypy (integration)
        run: uv run mypy custom_components/ha_claude_agent/

      - name: Mypy (add-on)
        run: uv run mypy ha_claude_agent_addon/src/

      - name: Pytest
        run: uv run pytest tests/ -v
